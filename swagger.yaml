openapi: "3.0.3"
info:
  title: Products & Import Service API
  description: API for managing and retrieving product catalog data, and importing products via CSV.
  version: "1.0.0"

servers:
  - url: https://snxmmu8nxb.execute-api.us-east-1.amazonaws.com/prod/
    description: Products Service API Gateway
  - url: https://p3l6m91vdi.execute-api.us-east-1.amazonaws.com/prod/
    description: Import Service API Gateway

paths:
  /products:
    get:
      summary: Get all products
      description: Returns the full list of available products (joined product + stock).
      operationId: getProductsList
      tags:
        - Products
      responses:
        "200":
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
              example:
                - id: "6023a861-92ec-430d-81a9-d66dc8e5f8ca"
                  title: "Wireless Noise-Cancelling Headphones"
                  description: "Over-ear headphones with active noise cancellation and 30-hour battery life."
                  price: 299
                  count: 10
                - id: "d2a69d18-59f7-4ae3-80a5-6b45843db835"
                  title: "Mechanical Keyboard"
                  description: "Tenkeyless mechanical keyboard with Cherry MX switches and RGB backlight."
                  price: 129
                  count: 5
        "404":
          description: No products found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      summary: Create a new product
      description: Creates a new product entry in the products and stock tables atomically.
      operationId: createProduct
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
            example:
              title: "New Gadget"
              description: "A shiny new gadget."
              price: 99
              count: 20
      responses:
        "201":
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      summary: Get product by ID
      description: Returns a single product (joined product + stock) matching the provided ID.
      operationId: getProductsById
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the product (UUID).
          schema:
            type: string
            format: uuid
          example: "6023a861-92ec-430d-81a9-d66dc8e5f8ca"
      responses:
        "200":
          description: The product matching the given ID as a flat object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
              example:
                id: "6023a861-92ec-430d-81a9-d66dc8e5f8ca"
                title: "Wireless Noise-Cancelling Headphones"
                description: "Over-ear headphones with active noise cancellation and 30-hour battery life."
                price: 299
                count: 10
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Product with id 6023a861-92ec-430d-81a9-d66dc8e5f8ca not found"

  /import:
    get:
      summary: Get a presigned S3 URL for CSV upload
      description: >
        Returns a presigned S3 PUT URL for the given file name.
        The client should then PUT the CSV file directly to S3 using this URL.
        The file will be placed in the `uploaded/` folder of the import bucket.
      operationId: importProductsFile
      tags:
        - Import
      parameters:
        - name: name
          in: query
          required: true
          description: The CSV file name (e.g. `products.csv`). Used as the S3 object key suffix.
          schema:
            type: string
          example: "products.csv"
      responses:
        "200":
          description: A presigned S3 PUT URL valid for 5 minutes
          content:
            text/plain:
              schema:
                type: string
              example: "https://importservicestack-importbucket.s3.us-east-1.amazonaws.com/uploaded/products.csv?X-Amz-Algorithm=..."
        "400":
          description: Missing required query parameter `name`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Query parameter 'name' is required"

components:
  schemas:
    Product:
      type: object
      required:
        - id
        - title
        - description
        - price
        - count
      properties:
        id:
          type: string
          format: uuid
          description: Unique product identifier
          example: "6023a861-92ec-430d-81a9-d66dc8e5f8ca"
        title:
          type: string
          description: Product name
          example: "Wireless Noise-Cancelling Headphones"
        description:
          type: string
          description: Detailed product description
          example: "Over-ear headphones with active noise cancellation and 30-hour battery life."
        price:
          type: integer
          description: Product price in USD
          example: 299
        count:
          type: integer
          minimum: 0
          description: Number of items available in stock
          example: 10

    CreateProductRequest:
      type: object
      required:
        - title
        - price
        - count
      properties:
        title:
          type: string
          description: Product name
          example: "New Gadget"
        description:
          type: string
          description: Detailed product description
          example: "A shiny new gadget."
        price:
          type: integer
          description: Product price in USD (must be positive)
          example: 99
        count:
          type: integer
          minimum: 0
          description: Initial stock count
          example: 20

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable error message
          example: "Product with id abc not found"
