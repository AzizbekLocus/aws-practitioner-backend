openapi: "3.0.3"
info:
  title: Products Service API
  description: API for managing and retrieving product catalog data.
  version: "1.0.0"

servers:
  - url: https://snxmmu8nxb.execute-api.us-east-1.amazonaws.com/prod/
    description: AWS API Gateway
    variables:
      apiId:
        default: "your-api-id"
        description: API Gateway ID (see ProductsApiUrl CDK output)
      region:
        default: "us-east-1"
        description: AWS region
      stage:
        default: "prod"
        description: Deployment stage

paths:
  /products:
    get:
      summary: Get all products
      description: Returns the full list of available products (joined product + stock).
      operationId: getProductsList
      tags:
        - Products
      responses:
        "200":
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
              example:
                - id: "6023a861-92ec-430d-81a9-d66dc8e5f8ca"
                  title: "Wireless Noise-Cancelling Headphones"
                  description: "Over-ear headphones with active noise cancellation and 30-hour battery life."
                  price: 299
                  count: 10
                - id: "d2a69d18-59f7-4ae3-80a5-6b45843db835"
                  title: "Mechanical Keyboard"
                  description: "Tenkeyless mechanical keyboard with Cherry MX switches and RGB backlight."
                  price: 129
                  count: 5
        "404":
          description: No products found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      summary: Create a new product
      description: Creates a new product entry in the products and stock tables atomically.
      operationId: createProduct
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
            example:
              title: "New Gadget"
              description: "A shiny new gadget."
              price: 99
              count: 20
      responses:
        "201":
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      summary: Get product by ID
      description: Returns a single product (joined product + stock) matching the provided ID.
      operationId: getProductsById
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the product (UUID).
          schema:
            type: string
            format: uuid
          example: "6023a861-92ec-430d-81a9-d66dc8e5f8ca"
      responses:
        "200":
          description: The product matching the given ID as a flat object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
              example:
                id: "6023a861-92ec-430d-81a9-d66dc8e5f8ca"
                title: "Wireless Noise-Cancelling Headphones"
                description: "Over-ear headphones with active noise cancellation and 30-hour battery life."
                price: 299
                count: 10
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Product with id 6023a861-92ec-430d-81a9-d66dc8e5f8ca not found"

components:
  schemas:
    Product:
      type: object
      required:
        - id
        - title
        - description
        - price
        - count
      properties:
        id:
          type: string
          format: uuid
          description: Unique product identifier
          example: "6023a861-92ec-430d-81a9-d66dc8e5f8ca"
        title:
          type: string
          description: Product name
          example: "Wireless Noise-Cancelling Headphones"
        description:
          type: string
          description: Detailed product description
          example: "Over-ear headphones with active noise cancellation and 30-hour battery life."
        price:
          type: integer
          description: Product price in USD
          example: 299
        count:
          type: integer
          minimum: 0
          description: Number of items available in stock
          example: 10

    CreateProductRequest:
      type: object
      required:
        - title
        - price
        - count
      properties:
        title:
          type: string
          description: Product name
          example: "New Gadget"
        description:
          type: string
          description: Detailed product description
          example: "A shiny new gadget."
        price:
          type: integer
          description: Product price in USD (must be positive)
          example: 99
        count:
          type: integer
          minimum: 0
          description: Initial stock count
          example: 20

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable error message
          example: "Product with id abc not found"
